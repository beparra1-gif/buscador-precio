<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Consulta Integrado</title>
    
    <!-- Librería para el Escáner de Código de Barras -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* Variables de color para un diseño moderno */
        :root {
            --primary: #da291c; /* Rojo corporativo (Bata/Reference) */
            --primary-hover: #b81f14;
            --dark: #1f2022;
            --gray: #888;
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-body); padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { width: 100%; max-width: 420px; background: var(--bg-card); padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 35px rgba(0,0,0,0.06); position: relative; }
        h2 { text-align: center; color: var(--dark); margin-top: 0; margin-bottom: 25px; font-size: 1.5em; font-weight: 700; }
        
        /* Cajas de inputs modernos con iconos integrados */
        .input-group { position: relative; width: 100%; margin-bottom: 20px; }
        .input-group svg.icon-left { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; color: var(--gray); cursor: pointer; transition: color 0.2s; z-index: 2; }
        .input-group svg.icon-left:hover { color: var(--primary); }
        
        .input-group input { width: 100%; padding: 16px 16px 16px 50px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 16px; color: var(--dark); outline: none; transition: all 0.3s ease; background-color: #fafafa; }
        .input-group input:focus { border-color: var(--dark); box-shadow: 0 0 0 4px rgba(31, 32, 34, 0.1); background-color: white; }
        
        /* Input específico para el escáner (Borde rojo como en tu referencia) */
        .input-group input.input-red-border { border-color: var(--primary); background-color: white; }
        .input-group input.input-red-border:focus { box-shadow: 0 0 0 4px rgba(218, 41, 28, 0.15); }

        /* Input simple sin icono */
        .input-group-simple input { padding: 16px; text-align: center; }

        /* Botones Mejorados */
        .btn-primary { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background-color 0.2s, transform 0.1s; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-dark { background-color: var(--dark); }
        .btn-dark:hover { background-color: #000; }

        .btn-volver { width: auto; padding: 10px 20px; background-color: transparent; color: var(--gray); border: none; font-size: 14px; cursor: pointer; font-weight: 600; display: block; margin: 10px auto 0; text-decoration: underline; transition: color 0.2s; }
        .btn-volver:hover { color: var(--dark); }
        
        /* Contenedores de Información */
        .tienda-activa-box { margin-bottom: 20px; font-size: 14px; color: #555; text-align: center; background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px solid #eaeaea; }
        .tienda-activa-box strong { color: var(--primary); }

        .info-box { background: #f8f9fa; border: 1px solid #eaeaea; border-radius: 12px; padding: 18px; margin-bottom: 20px; text-align: left; }
        .info-item { margin-bottom: 12px; font-size: 15px; color: #555; display: flex; justify-content: space-between; border-bottom: 1px dashed #e0e0e0; padding-bottom: 6px; }
        .info-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .info-label { font-weight: 700; color: var(--dark); }
        
        .loader { display: none; text-align: center; font-weight: bold; color: var(--gray); margin: 15px 0; }
        
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .product-img { width: 100%; max-width: 180px; height: 180px; background: #f0f0f0; margin: 0 auto 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 16px; color: #aaa; font-size: 12px; border: 2px dashed #ddd; overflow: hidden; }
        .price-container { margin: 20px 0; border-top: 2px solid #eee; padding-top: 15px; text-align: center; }
        .price-sir { color: var(--gray); font-size: 1.1em; text-decoration: line-through; }
        .price-actual { color: var(--primary); font-weight: 800; font-size: 2em; margin: 5px 0; }
        .discount-badge { background: var(--primary); color: white; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 0.95em; display: inline-block; margin-bottom: 15px; }

        /* Modal del Escáner mejorado con efecto Blur */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #reader { width: 100%; max-width: 360px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-cerrar-scanner { margin-top: 25px; padding: 14px 30px; background: white; color: var(--dark); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .btn-cerrar-scanner:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="card">
    
    <!-- PANTALLA 1: BUSCADOR EDP -->
    <div id="view-1" class="view active">
        <h2>Buscador de Tienda</h2>
        <div class="input-group input-group-simple">
            <input type="text" id="edpInput" placeholder="Ingrese c&oacute;digo EDP de la tienda" autofocus onfocus="this.select()">
        </div>
        <button class="btn-primary btn-dark" onclick="procesarEDP()">Buscar Tienda</button>

        <div id="edp-result-container" style="display: none; margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px;">
            <div class="info-box">
                <div class="info-item"><span class="info-label">EDP:</span> <span id="outGlosa">---</span></div>
                <div class="info-item"><span class="info-label">Cadena:</span> <span id="outCadena">---</span></div>
                <div class="info-item"><span class="info-label">Zona:</span> <span id="outZona">---</span></div>
                <div class="info-item"><span class="info-label">Distrito:</span> <span id="outDistrito">---</span></div>
            </div>
            <button class="btn-primary" onclick="irAPantalla2()">Siguiente</button>
            <button class="btn-volver" onclick="limpiarEDP()">Volver</button>
        </div>
    </div>

    <!-- PANTALLA 2: BUSCADOR DE CÓDIGOS Y ESCÁNER INTEGRADO -->
    <div id="view-2" class="view">
        <h2>Consulta de Precios</h2>
        
        <div class="tienda-activa-box">
            Tienda Activa: <strong id="lblTiendaActiva">---</strong>
        </div>
        
        <div class="input-group">
            <!-- Icono de escáner embebido dentro del input (como en la foto de referencia) -->
            <svg class="icon-left" onclick="abrirScanner()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="Escanear c&oacute;digo">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                <rect x="7" y="7" width="2" height="10"></rect>
                <rect x="11" y="7" width="2" height="10"></rect>
                <rect x="15" y="7" width="2" height="10"></rect>
            </svg>
            <input type="text" id="codigoInput" class="input-red-border" placeholder="Ingrese o escanee c&oacute;digo..." onfocus="this.select()">
        </div>

        <button class="btn-primary" onclick="procesarCodigo()">
            <!-- Icono de Lupa -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Buscar
        </button>
        
        <button class="btn-volver" onclick="cambiarVista('view-1')">Volver atr&aacute;s</button>
    </div>

    <!-- PANTALLA 3: RESULTADO DE PRODUCTO -->
    <div id="view-3" class="view">
        <h2 style="margin-bottom: 15px;">Detalle de Producto</h2>
        
        <div style="text-align: center;">
            <div id="outDescuento" class="discount-badge">-%</div>
        </div>
        
        <div class="product-img" id="imgContenedor">📸 Foto por definir</div>
        
        <div class="info-box">
            <div class="info-item"><span class="info-label">Marca:</span> <span id="outMarca">---</span></div>
            <div class="info-item"><span class="info-label">G&eacute;nero:</span> <span id="outGenero">---</span></div>
            <div class="info-item"><span class="info-label">Proyecto:</span> <span id="outProyecto">---</span></div>
            <div class="info-item"><span class="info-label">Stock Actual:</span> <span id="outStock" style="font-weight: bold; font-size: 1.1em;">---</span></div>
        </div>

        <div class="price-container">
            <div class="price-sir">PRECIO ANTES: <span id="outPrecioSir">---</span></div>
            <div id="outNuevoPrecio" class="price-actual">---</div>
        </div>

        <button class="btn-primary" onclick="cambiarVista('view-2')">Nueva Consulta</button>
    </div>

    <div id="loading" class="loader">Buscando información...</div>

</div>

<!-- MODAL DEL ESCÁNER DE CÁMARA -->
<div id="scanner-modal">
    <h3 style="color:white; margin-bottom: 20px;">Enfoca el C&oacute;digo de Barras</h3>
    <div id="reader"></div>
    <button class="btn-cerrar-scanner" onclick="cerrarScanner()">Cancelar Escaneo</button>
</div>

<script>
    // 🚨 REEMPLAZA ESTA URL POR TU URL DE GOOGLE APPS SCRIPT AQUÍ:
    const urlAPI = "https://script.google.com/macros/s/AKfycby6lSF6gjJWTF8UVqFW16vARSORJH-kVPWo4z8VbQnPM7pDAir3PxvtP62-Oylfbg8U/exec";

    let edpActual = "";
    let glosaActual = "";
    let html5QrcodeScanner = null;

    const formatearMoneda = (valor) => {
        if (!valor) return '$0';
        const numero = parseInt(valor.toString().replace(/\D/g, ""), 10);
        if (isNaN(numero)) return valor; 
        return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(numero);
    };

    function cambiarVista(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        
        if(viewId === 'view-1') document.getElementById('edpInput').focus();
        if(viewId === 'view-2') {
            document.getElementById('lblTiendaActiva').innerText = edpActual + " - " + glosaActual;
            document.getElementById('codigoInput').value = "";
            document.getElementById('codigoInput').focus();
        }
    }

    // ==========================================
    // LÓGICA DEL ESCÁNER DE CÁMARA
    // ==========================================
    function abrirScanner() {
        document.getElementById('scanner-modal').style.display = 'flex';
        
        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5Qrcode("reader");
        }
        
        const config = { fps: 10, qrbox: { width: 280, height: 150 } };
        
        html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            alert("Error al abrir la c\u00e1mara. Aseg\u00farate de dar permisos en el navegador.");
            cerrarScanner();
        });
    }

    function cerrarScanner() {
        document.getElementById('scanner-modal').style.display = 'none';
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().catch(err => console.log(err));
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        cerrarScanner();
        document.getElementById('codigoInput').value = decodedText;
        procesarCodigo(); // Busca automáticamente
    }
    // ==========================================

    async function procesarEDP() {
        const edp = document.getElementById('edpInput').value.trim();
        if(!edp) return alert("Por favor, ingrese un EDP");
        
        document.getElementById('loading').style.display = "block";
        document.getElementById('edp-result-container').style.display = "none";
        
        try {
            const res = await fetch(`${urlAPI}?action=buscarEDP&edp=${edp}`);
            const data = await res.json();
            document.getElementById('loading').style.display = "none";
            
            if(data.encontrado) {
                edpActual = edp; 
                glosaActual = data.glosaTienda; 
                
                document.getElementById('outGlosa').innerText = data.glosaTienda;
                document.getElementById('outCadena').innerText = data.cadena;
                document.getElementById('outZona').innerText = data.zona;
                document.getElementById('outDistrito').innerText = data.distrito;
                document.getElementById('edp-result-container').style.display = "block";
            } else {
                alert("C\u00f3digo EDP no registrado en las tiendas.");
            }
        } catch (error) {
            document.getElementById('loading').style.display = "none";
            alert("Error al conectar con la base de datos de tiendas.");
        }
    }

    function limpiarEDP() {
        document.getElementById('edpInput').value = "";
        edpActual = ""; 
        glosaActual = "";
        document.getElementById('edp-result-container').style.display = "none";
        document.getElementById('edpInput').focus();
    }

    function irAPantalla2() {
        cambiarVista('view-2');
    }

    async function procesarCodigo() {
        let codigo = document.getElementById('codigoInput').value.trim();
        if(!codigo) return alert("Por favor, ingrese o escanee un c\u00f3digo");
        
        // 🚨 LÓGICA EAN-13: Cortar del dígito 2 al 8
        if (codigo.length === 13 && !isNaN(codigo)) {
            codigo = codigo.substring(1, 8);
            document.getElementById('codigoInput').value = codigo; // Muestra el código cortado
        }
        
        document.getElementById('loading').style.display = "block";
        
        try {
            const res = await fetch(`${urlAPI}?action=buscarCodigo&codigo=${codigo}&edp=${edpActual}`);
            const data = await res.json();
            document.getElementById('loading').style.display = "none";
            
            if(data.encontrado) {
                document.getElementById('outMarca').innerText = data.marca || '--';
                document.getElementById('outGenero').innerText = data.genero || '--';
                document.getElementById('outProyecto').innerText = (data.proyecto && data.proyecto.toString().trim() !== "") ? data.proyecto : '--';
                
                document.getElementById('outPrecioSir').innerText = formatearMoneda(data.precioSir);
                document.getElementById('outNuevoPrecio').innerText = formatearMoneda(data.nuevoPrecio);
                
                let descValue = data.descuento ? data.descuento.toString().trim().replace(',', '.') : '0';
                let numDesc = parseFloat(descValue.replace('%', ''));
                if (!isNaN(numDesc) && numDesc !== 0) {
                    if (numDesc > 0 && numDesc <= 1) numDesc = Math.round(numDesc * 100);
                    document.getElementById('outDescuento').innerText = `DESCUENTO -${numDesc}%`;
                    document.getElementById('outDescuento').style.display = "inline-block";
                } else {
                    document.getElementById('outDescuento').style.display = "none";
                }
                
                const stockElemento = document.getElementById('outStock');
                if (parseInt(data.stock, 10) === 0 || data.stock === "0") {
                    stockElemento.style.color = "#da291c"; 
                    stockElemento.innerText = "SIN STOCK";
                } else {
                    stockElemento.style.color = "#1f2022"; 
                    stockElemento.innerText = data.stock !== undefined ? data.stock : '0';
                }

                // =========================================================
                // LÓGICA DE FOTOS LOCALES (EN GITHUB) + RESPALDO BATA.CL
                // =========================================================
                const imgContainer = document.getElementById('imgContenedor');
                imgContainer.innerHTML = ''; 
                
                // Busca la foto en la carpeta que subas a GitHub ("fotos")
                const urlFoto = `./fotos/${codigo}.jpg`; 
                const urlBusquedaBata = `https://www.bata.com/cl/search?q=${codigo}`;

                const imgElement = document.createElement('img');
                imgElement.src = urlFoto;
                imgElement.style.width = '100%';
                imgElement.style.height = '100%';
                imgElement.style.objectFit = 'contain';
                
                // Si la foto no existe localmente, crea el enlace a Bata.cl
                imgElement.onerror = function() {
                    imgContainer.style.background = '#f8f9fa';
                    imgContainer.style.border = '2px dashed #ddd';
                    imgContainer.innerHTML = `
                        <a href="${urlBusquedaBata}" target="_blank" style="color:#666; text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; padding: 10px;">
                            <span style="font-size:28px;">📸</span>
                            <span style="margin-top:5px; font-weight:bold;">Sin Foto Interna</span>
                            <span style="color:#da291c; font-size:13px; text-decoration:underline; margin-top:5px; text-align: center;">Toca aqu&iacute; para ver el producto en Bata.cl</span>
                        </a>
                    `;
                };

                imgContainer.appendChild(imgElement);
                imgContainer.style.background = "transparent";
                imgContainer.style.border = "none";
                // =========================================================

                cambiarVista('view-3');
            } else {
                alert("El c\u00f3digo de producto no existe en esta tienda.");
            }
        } catch (error) {
            document.getElementById('loading').style.display = "none";
            alert("Error al conectar con la base de datos.");
        }
    }
</script>
</body>
</html>
